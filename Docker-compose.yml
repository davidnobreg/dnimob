version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Stack de produção — Docker Swarm / Portainer
# Imagem imutável: código baked no build via GitHub Actions
# Variáveis de ambiente configuradas no Portainer (não usa .env)
# Redes e volumes criados externamente antes do primeiro deploy
# ─────────────────────────────────────────────────────────────────

services:

  # ── Django (web) ────────────────────────────────────────────────
  web:
    image: davidnobrega/dnimob:latest

    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - RUN_MIGRATIONS=true
      - SENTRY_DSN=${SENTRY_DSN}
      - GIT_COMMIT=${GIT_COMMIT}

    #ports:
     # - "8002:8002"

    volumes:
      - dnimob_logs:/app/logs
      - dnimob_media:/app/media
      - configuration:/app/configuration

    networks:
      - app_network
      - npm_public

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1"
          memory: 1024M

  # ── Celery Worker ───────────────────────────────────────────────
  celery:
    image: davidnobrega/dnimob:latest

    command: celery -A config worker --loglevel=info --concurrency=4 -Q celery,financeiro,whatsapp

    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SENTRY_DSN=${SENTRY_DSN}

    volumes:
      - dnimob_logs:/app/logs
      - dnimob_media:/app/media
      - configuration:/app/configuration

    networks:
      - app_network

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ── Celery Beat (agendador) ─────────────────────────────────────
  beat:
    image: davidnobrega/dnimob:latest

    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod

    volumes:
      - dnimob_logs:/app/logs
      - dnimob_celerybeat:/app/celerybeat
      - configuration:/app/configuration

    networks:
      - app_network

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ── Flower (monitor Celery) ─────────────────────────────────────
  flower:
    image: davidnobrega/dnimob:latest

    command: celery -A config flower --port=5556 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}

    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod

    #ports:
      #- "5556:5556"

    volumes:
      - dnimob_logs:/app/logs
      - configuration:/app/configuration

    networks:
      - app_network

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  dnimob_logs:
    external: true
  dnimob_media:
    external: true
  dnimob_celerybeat:
    external: true
  configuration:
    external: true

networks:
  app_network:
    external: true
  npm_public:
    external: true