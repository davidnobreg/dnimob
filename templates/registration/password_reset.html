{% extends "base.html" %}
{% block title %}Redefinir Senha{% endblock %}

{% block content %}
<div class="w-full max-w-md p-8">
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i class="ti ti-lock-open text-white text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Redefinir senha</h1>
    <p class="text-sm text-gray-500 mt-1">Digite seu e-mail para receber o link de redefinição.</p>
  </div>

  <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
      <input name="email" type="email" required autofocus
             placeholder="seu@email.com"
             class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <button type="submit"
            class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
      Enviar link de redefinição
    </button>

    <div class="text-center">
      <a href="{% url 'login' %}" class="text-sm text-gray-500 hover:text-gray-700 hover:underline">
        ← Voltar ao login
      </a>
    </div>
  </form>
</div>
{% endblock %}
