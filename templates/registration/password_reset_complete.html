{% extends "base.html" %}
{% block title %}Senha Redefinida{% endblock %}

{% block content %}
<div class="w-full max-w-md p-8">
  <div class="text-center">
    <div class="w-14 h-14 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i class="ti ti-circle-check text-white text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Senha redefinida!</h1>
    <p class="text-sm text-gray-500 mt-2 mb-6">
      Sua senha foi alterada com sucesso. Faça login com a nova senha.
    </p>
    <a href="{% url 'login' %}"
       class="inline-block bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 px-6 rounded-lg text-sm transition-colors">
      Ir para o login
    </a>
  </div>
</div>
{% endblock %}
