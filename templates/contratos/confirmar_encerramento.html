{% extends "base.html" %}

{% block title %}Encerrar Contrato{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-12">
  <div class="bg-white rounded-xl border border-orange-100 p-8 shadow-sm">
    <div class="w-14 h-14 rounded-full bg-orange-50 flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-gray-900 text-center mb-1">Encerrar contrato?</h1>
    <p class="text-center text-sm text-gray-500 mb-6">
      <span class="font-mono font-semibold">{{ contrato.numero }}</span> —
      {{ contrato.inquilino.nome }}
    </p>

    <p class="text-xs text-gray-500 text-center mb-6">
      O imóvel será marcado como <strong>disponível</strong> e as parcelas pendentes serão <strong>canceladas</strong>.
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Motivo do encerramento</label>
        <div class="space-y-2">
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="radio" name="motivo" value="encerrado" checked class="text-primary"> Término natural do contrato
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="radio" name="motivo" value="rescindido" class="text-red-500"> Rescisão antecipada
          </label>
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <a href="{% url 'contrato_detalhe' contrato.pk %}"
           class="flex-1 text-center py-2 text-sm font-medium rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-50 transition">
          Cancelar
        </a>
        <button type="submit"
                class="flex-1 py-2 text-sm font-semibold rounded-lg bg-orange-600 text-white hover:bg-orange-700 transition">
          Confirmar Encerramento
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
