<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin — DN Imob</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-slate-100 flex items-center justify-center">
    <div class="w-full max-w-sm p-6">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center mx-auto mb-3">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-900">Acesso Restrito</h1>
            <p class="text-sm text-slate-500 mt-1">Painel do Superadmin</p>
        </div>

        <form method="post" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
            {% csrf_token %}
            {% if form.errors %}
            <div class="bg-red-50 text-red-700 text-sm p-3 rounded-lg border border-red-200">
                Usuário ou senha incorretos.
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Usuário</label>
                <input name="username" type="text" required autofocus
                       class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input name="password" type="password" required
                       class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent">
            </div>

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit"
                    class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
