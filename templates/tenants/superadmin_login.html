{% extends "base_admin.html" %}
{% block title %}Superadmin — DN Imob{% endblock %}

{% block content %}
<div class="relative min-h-screen overflow-hidden bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-900 flex items-center justify-center px-4">

    <div class="pointer-events-none absolute inset-0 overflow-hidden">
        <div class="animate-blob absolute -top-24 -left-16 h-96 w-96 rounded-full bg-blue-400/30 mix-blend-screen blur-3xl"></div>
        <div class="animate-blob animation-delay-2000 absolute -bottom-24 -right-16 h-96 w-96 rounded-full bg-indigo-400/30 mix-blend-screen blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-sm" data-aos="fade-up" data-aos-duration="600">
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-white/10 backdrop-blur-sm ring-1 ring-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="font-display text-2xl font-bold text-white">Acesso Restrito</h1>
            <p class="text-sm text-blue-100 mt-1">Painel do Superadmin</p>
        </div>

        <form method="post" class="bg-white rounded-2xl shadow-2xl shadow-blue-950/40 border border-white/50 p-6 space-y-4">
            {% csrf_token %}
            {% if form.errors %}
            <div class="bg-red-50 text-red-700 text-sm p-3 rounded-lg border border-red-200">
                Usuário ou senha incorretos.
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Usuário</label>
                <input name="username" type="text" required autofocus
                       class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm transition-all duration-200 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Senha</label>
                <input name="password" type="password" required
                       class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm transition-all duration-200 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15">
            </div>

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 hover:scale-[1.02] hover:shadow-xl text-white font-bold py-2.5 rounded-xl text-sm shadow-lg shadow-blue-600/20 transition-all duration-300">
                Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
