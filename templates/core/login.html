{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="w-full max-w-md p-8">
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-primary-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i class="ti ti-building-estate text-white text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Entrar na sua conta</h1>
    <p class="text-sm text-gray-500 mt-1">{{ tenant_nome }}</p>
  </div>

  <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
    {% csrf_token %}
    {% if form.errors %}
    <div class="bg-red-50 text-red-700 text-sm p-3 rounded-lg border border-red-200">
      Usuário ou senha incorretos.
    </div>
    {% endif %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
      <input name="username" type="text" required autofocus
             class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block text-sm font-medium text-gray-700">Senha</label>
        <a href="{% url 'password_reset' %}"
           class="text-xs text-primary-600 hover:text-primary-700 hover:underline">
          Esqueci minha senha
        </a>
      </div>
      <input name="password" type="password" required
             class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit"
            class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
      Entrar
    </button>
  </form>
</div>
{% endblock %}
