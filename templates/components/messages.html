{% if messages %}
<div class="mb-6 space-y-2">
  {% for message in messages %}
  <div x-data="{ show: true }" x-show="show" x-cloak
       class="flex items-start gap-3 p-4 rounded-xl border
       {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
       {% elif message.tags == 'success' %}bg-green-50 border-green-200 text-green-800
       {% elif message.tags == 'warning' %}bg-yellow-50 border-yellow-200 text-yellow-800
       {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
    <i class="ti
       {% if message.tags == 'error' %}ti-circle-x text-red-500
       {% elif message.tags == 'success' %}ti-circle-check text-green-500
       {% elif message.tags == 'warning' %}ti-alert-triangle text-yellow-500
       {% else %}ti-info-circle text-blue-500{% endif %} text-xl flex-shrink-0 mt-0.5"></i>
    <p class="flex-1 text-sm">{{ message }}</p>
    <button @click="show=false" class="text-current opacity-50 hover:opacity-100">
      <i class="ti ti-x text-sm"></i>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
