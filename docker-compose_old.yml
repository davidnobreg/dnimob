version: "3.9"

services:
  web:
    image: davidnobrega/dnimob:latest
    ports:
      - "8000:8000"
    environment:
      - SENTRY_DSN=${SENTRY_DSN}
      - ENVIRONMENT=production
      - GIT_COMMIT=${GIT_COMMIT}
      - RUN_MIGRATIONS=true               # TODO: confirmar se o Dockerfile já tem entrypoint que lê essa var; se não tiver, troca por "command: gunicorn config.wsgi:application --bind 0.0.0.0:8000"
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    volumes:
      - configuration:/app/configuration
      - logs:/app/logs
      - media_compartilhada:/app/media
      - static_volume:/app/static
    networks:
      - app_network
      - npm_public
      - rede_postgres      # TODO: nome real (docker network ls)
      - rede_redis         # TODO: nome real
      - rede_evolution     # TODO: nome real — só se web chamar a Evolution API direto (enviar mensagem)
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1"
          memory: 1024M

  celery:
    image: davidnobrega/dnimob:latest
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=4
      -Q celery,financeiro,whatsapp
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    volumes:
      - configuration:/app/configuration
      - logs:/app/logs
      - media_compartilhada:/app/media
    networks:
      - app_network
      - rede_postgres
      - rede_redis
      - rede_evolution
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  celery-beat:
    image: davidnobrega/dnimob:latest
    command: >
      celery -A config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    volumes:
      - configuration:/app/configuration
      - logs:/app/logs
      - celerybeat:/app/celerybeat
    networks:
      - app_network
      - rede_postgres
      - rede_redis
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  flower:
    image: davidnobrega/dnimob:latest
    command: >
      celery -A config flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    volumes:
      - configuration:/app/configuration
      - logs:/app/logs
    networks:
      - app_network
      - rede_redis
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  configuration:
    external: true   # TODO: ainda não existe no servidor (só media/celerybeat/logs existiam) — criar antes do deploy
  logs:
    external: true
  media_compartilhada:
    external: true
  static_volume:
    external: true   # TODO: confirmar se existe; senão criar também
  celerybeat:
    external: true

networks:
  app_network:
    external: true
  npm_public:
    external: true
  rede_postgres:
    external: true   # TODO: nome real da rede da stack de Postgres já rodando
  rede_redis:
    external: true   # TODO: nome real da rede da stack de Redis já rodando
  rede_evolution:
    external: true   # TODO: nome real da rede da stack de Evolution API já rodando