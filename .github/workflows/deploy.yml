name: Build e Deploy DNImob

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build e Deploy DNImob
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dnimob:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dnimob:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}

      - name: Redeploy via API do Portainer
        env:
          DOCKER_DEFAULT_PLATFORM: linux/arm64
          GIT_COMMIT: ${{ github.sha }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FLOWER_USER: ${{ secrets.FLOWER_USER }}
          FLOWER_PASSWORD: ${{ secrets.FLOWER_PASSWORD }}
        run: |
          set -e

          echo "Lendo stack file do repositório..."
          STACK_FILE_JSON=$(python3 -c "
          import json
          with open('Docker-compose.yml', 'r') as f:
              content = f.read()
          print(json.dumps(content))
          ")

          echo "Atualizando stack no Portainer..."
          RESPONSE=$(curl -s -o /tmp/portainer_response.json -w "%{http_code}" -X PUT \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/70?endpointId=1" \
            -d "{
              \"stackFileContent\": $STACK_FILE_JSON,
              \"env\": [
                {\"name\": \"GIT_COMMIT\",     \"value\": \"$GIT_COMMIT\"},
                {\"name\": \"SENTRY_DSN\",      \"value\": \"$SENTRY_DSN\"},
                {\"name\": \"FLOWER_USER\",     \"value\": \"$FLOWER_USER\"},
                {\"name\": \"FLOWER_PASSWORD\", \"value\": \"$FLOWER_PASSWORD\"}
              ],
              \"pullImage\": true,
              \"prune\": true
            }")

          echo "Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Erro ao atualizar stack:"
            cat /tmp/portainer_response.json
            exit 1
          fi

          echo "Deploy concluído. Commit: $GIT_COMMIT"
